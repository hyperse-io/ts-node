name: CI-unitest

on:
  push:
    branches:
      - main
      - major
      - minor
    # Only consider those paths to trigger the action
    paths:
      - 'src/**'
      - 'tests/**'
      - 'packages/**'
      - 'package.json'
      - '*.lock'
      - '.yarnrc.yml'
      - 'tsconfig.base.json'
      - '.prettier*'
      - '.github/**'

  pull_request:
    branches:
      - main
      - major
      - minor
    types:
      - opened
      - synchronize
      - reopened
    # Only consider those paths to trigger the action
    paths:
      - 'src/**'
      - 'tests/**'
      - 'packages/**'
      - 'package.json'
      - '*.lock'
      - '.yarnrc.yml'
      - 'tsconfig.base.json'
      - '.prettier*'
      - '.github/**'
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Use Node.js (latest)
        uses: actions/setup-node@v6
        with:
          node-version: latest

      - name: 📥 Install Dependencies
        run: yarn --frozen-lockfile

      - name: Linter
        run: |
          yarn lint

      - name: Build
        run: |
          yarn build

      - name: Unit tests
        run: |
          yarn test
